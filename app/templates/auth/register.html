{% extends "base.html" %}
{% block title %}Register — ClearUnit{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-8">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold">
                <span class="text-[#C9A84C]">CLEAR</span><span class="text-[#0B1F3A]">UNIT</span>
            </h1>
            <p class="text-gray-500 mt-2 text-sm">Property Management Platform</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-[#0B1F3A] px-8 py-5">
                <h2 class="text-white text-xl font-semibold">Create Account</h2>
                <p class="text-gray-400 text-sm mt-1">Join ClearUnit to manage your properties</p>
            </div>
            <div class="px-8 py-8">
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-5">
                        <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="full_name" name="full_name" required
                               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0B1F3A] focus:border-transparent transition"
                               placeholder="John Smith">
                    </div>

                    <div class="mb-5">
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0B1F3A] focus:border-transparent transition"
                               placeholder="you@example.com">
                    </div>

                    <div class="mb-5">
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required
                               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0B1F3A] focus:border-transparent transition"
                               placeholder="••••••••">
                    </div>

                    <div class="mb-6">
                        <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Account Type</label>
                        <select id="role" name="role" required
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0B1F3A] focus:border-transparent transition bg-white">
                            <option value="" disabled selected>Select your role</option>
                            <option value="manager">Property Manager</option>
                            <option value="resident">Resident</option>
                        </select>
                    </div>

                    <button type="submit"
                            class="w-full bg-[#C9A84C] hover:bg-yellow-500 text-[#0B1F3A] font-bold py-3 rounded-lg transition-colors text-sm">
                        Create Account
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 mt-6">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}" class="text-[#0B1F3A] font-semibold hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
